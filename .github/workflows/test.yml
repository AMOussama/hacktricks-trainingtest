name: 'Aws testing'
 
# The workflow should only trigger on pull requests to the main branch
on:
  workflow_dispatch:
 
# Required to get the ID Token that will be used for OIDC
permissions:
  id-token: write
 
jobs:
  read-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
 
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::626635414792:role/whitebox-lab-2-github-actions-role
          role-session-name: OIDCSession
 
      - run: aws secretsmanager get-secret-value --secret-id arn:aws:secretsmanager:us-east-1:626635414792:secret:flag_whitebox_lab_2_2-ldHE2F
        shell: bash
